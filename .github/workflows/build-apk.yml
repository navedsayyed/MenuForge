name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace --max-workers=2
        env:
          GRADLE_OPTS: "-Xmx2048m -XX:MaxMetaspaceSize=512m"

      # ✅ RENAME STEP (MAIN + OTHERS)
      - name: Rename APKs (MenuForge format)
        run: |
          cd android/app/build/outputs/apk/release

          # Main APK
          if [ -f app-arm64-v8a-release.apk ]; then
            mv app-arm64-v8a-release.apk MenuForge.apk
          fi

          # Other APKs
          if [ -f app-armeabi-v7a-release.apk ]; then
            mv app-armeabi-v7a-release.apk MenuForge-armeabi-v7a.apk
          fi

          if [ -f app-x86_64-release.apk ]; then
            mv app-x86_64-release.apk MenuForge-x86_64.apk
          fi

          if [ -f app-x86-release.apk ]; then
            mv app-x86-release.apk MenuForge-x86.apk
          fi

          ls -lh

      - name: Upload APK as Artifact (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: menuforge-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Get version info
        id: version
        run: |
          echo "date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          echo "time=$(date +'%H%M')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Public Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          repository: navedsayyed/MenuForge-Releases
          tag_name: menuforge-v${{ steps.version.outputs.date }}-${{ steps.version.outputs.time }}
          name: MenuForge v${{ steps.version.outputs.date }}
          body: |
            ## 🍽️ MenuForge - Latest Build

            🎯 **Download this (recommended):**
            👉 **MenuForge.apk** ✅ Works on most devices

            ---

            ### 📦 Other Options

            - MenuForge-armeabi-v7a.apk → Older phones
            - MenuForge-x86_64.apk → Emulators
            - MenuForge-x86.apk → Rare devices

            ---

            ### ℹ️ Installation
            1. Download APK
            2. Open on phone
            3. Allow unknown sources
            4. Install 🚀

            ---

            **Build Info:**
            - 📅 Date: ${{ steps.version.outputs.date }}
            - 🔗 Commit: ${{ steps.version.outputs.sha_short }}
            - 🏗️ GitHub Actions Build

            *Auto-generated release*
          files: |
            android/app/build/outputs/apk/release/MenuForge.apk
            android/app/build/outputs/apk/release/MenuForge-armeabi-v7a.apk
            android/app/build/outputs/apk/release/MenuForge-x86_64.apk
            android/app/build/outputs/apk/release/MenuForge-x86.apk
          draft: false
          prerelease: false

      - name: Build Summary
        if: success()
        run: |
          echo "## ✅ APK Built Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 Main APK: MenuForge.apk (recommended)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 https://github.com/navedsayyed/MenuForge-Releases/releases" >> $GITHUB_STEP_SUMMARY
